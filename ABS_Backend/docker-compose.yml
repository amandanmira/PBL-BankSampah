version: '3.8'

services:
  app:
    build: .
    image: php:8.2-fpm
    container_name: ABS_app
    volumes:
      - .:/var/www
    working_dir: /var/www

  web:
    image: nginx:latest
    container_name: ABS_nginx
    ports:
      - "8000:80"
    volumes:
      - .:/var/www
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app

  db:
    image: mysql:8
    container_name: ABS_db
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: ABS
    ports:
      - "3307:3306"

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    ports:
      - "8080:80"
    environment:
      - PMA_HOST=db
      - PMA_PORT=3306
    depends_on:
      - db
